spring:
  application:
    name: bankbridge
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bankbridge?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:bankbridge}
    password: ${DB_PASSWORD:bankbridge}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:bankbridge}
    password: ${RABBITMQ_PASS:bankbridge}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          multiplier: 2
          max-attempts: 5
          max-interval: 30000
        default-requeue-rejected: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
  api-docs:
    path: /api-docs
