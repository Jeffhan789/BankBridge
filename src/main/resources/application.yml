spring:
  application:
    name: bankbridge
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bankbridge?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:bankbridge}
    password: ${DB_PASSWORD:bankbridge}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
  api-docs:
    path: /api-docs
