services:
  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: bankbridge
      RABBITMQ_DEFAULT_PASS: bankbridge
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: bankbridge
      MYSQL_USER: bankbridge
      MYSQL_PASSWORD: bankbridge
      MYSQL_ROOT_PASSWORD: local-root-only
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ubankbridge", "-pbankbridge", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - bankbridge_mysql:/var/lib/mysql

  api:
    build: .
    environment:
      DB_URL: jdbc:mysql://mysql:3306/bankbridge?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: bankbridge
      DB_PASSWORD: bankbridge
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  bankbridge_mysql:
